# Render deployment for the Soul Matching Platform backend.
# The authoritative FastAPI app is backend/main.py (module `main:app`).
services:
  - type: web
    name: soul-matching-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY      # service role — server only, never shipped to client
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_WEBHOOK_SECRET        # REQUIRED: shared secret for /webhook/analyze-profile
        sync: false
      - key: FRONTEND_ORIGINS               # e.g. https://your-app.vercel.app,http://localhost:3000
        sync: false
